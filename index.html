<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chronos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #000;
        color: white;
        overflow: hidden; /* Prevent scrolling on main body for full-screen feel */
      }
      h1, h2, h3, h4, h5, h6, .cinematic-text {
        font-family: 'Cinzel', serif;
      }
      
      /* Utility to hide scrollbar but allow functionality */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }

      /* Base Fade Utils */
      .fade-enter { opacity: 0; }
      .fade-enter-active { opacity: 1; transition: opacity 1000ms ease-in-out; }
      .fade-exit { opacity: 1; }
      .fade-exit-active { opacity: 0; transition: opacity 1000ms ease-in-out; }
      
      /* Cinematic Animations */
      @keyframes cinematicReveal {
        0% {
          opacity: 0;
          transform: translateY(30px) scale(0.98);
          filter: blur(12px);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
          filter: blur(0);
        }
      }

      @keyframes slideDownFade {
        0% {
          opacity: 0;
          transform: translateY(-20px);
        }
        100% {
          opacity: 0.7; /* Keep history slightly muted */
          transform: translateY(0);
        }
      }

      @keyframes fadeInSimple {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes optionsSlideUp {
        0% {
          opacity: 0;
          transform: translateY(40px);
        }
        50% { /* Delay effect */
          opacity: 0;
          transform: translateY(40px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes slowPanZoom {
        0% { transform: scale(1.05); }
        100% { transform: scale(1.0); }
      }

      .animate-cinematic-reveal {
        animation: cinematicReveal 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }

      .animate-options-reveal {
        animation: optionsSlideUp 1.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }

      .animate-bg-enter {
        animation: fadeInSimple 1.2s ease-out forwards, slowPanZoom 20s ease-out forwards;
      }

      /* Glassmorphism utilities */
      .glass-panel {
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
    </style>
